              <h2 className="text-2xl font-extrabold text-black mb-1">投票系統</h2>
              <h3 className="text-lg font-bold text-black mb-4">登入投票網站須進行身份認證</h3>
              <p className="text-slate-600 font-medium mb-8">(請輸入校方提供的6位驗證碼進行投票)</p>
              
              <form onSubmit={handleLogin} className="space-y-6">
                <input
                  type="text"
                  maxLength={6}
                  value={inputCode}
                  onChange={(e) => setInputCode(e.target.value.toUpperCase())}
                  placeholder="例如：AB12CD"
                  className="w-full text-center text-3xl tracking-widest font-mono font-bold px-4 py-4 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all uppercase"
                />
                <Button type="submit" className="w-full py-4 text-lg" disabled={inputCode.length !== 6}>
                  前往投票網站 <Icon name="ArrowRight" className="w-5 h-5 ml-2" />
                </Button>
              </form>
              
              {systemState === 'active' && timeLeft && (
                 <div className={`mt-6 p-3 rounded-lg text-sm font-medium ${timeStatus === 'waiting' ? 'bg-yellow-50 text-yellow-700' : timeStatus === 'ended' ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'}`}>
                   {timeStatus === 'waiting' ? timeLeft : timeStatus === 'ended' ? '投票已結束' : timeLeft}
                 </div>
              )}
            </Card>
          </div>
        );
      }

      if (currentVoterCode === 'SUBMITTED_SUCCESS') {
        const participatedCount = voterCodes.filter(c => c.used).length;
        const totalCount = parseInt(appData.actualDistributedCodes) || voterCodes.length;
        const participationRate = totalCount > 0 ? Math.round((participatedCount / totalCount) * 100) : 0;

        return (
          <div className="flex items-center justify-center min-h-[60vh]">
            <Card className="w-full max-w-md p-8 text-center shadow-lg border-t-4 border-t-green-500">
              <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <Icon name="CheckCircle2" className="w-10 h-10" />
              </div>
              <h2 className="text-2xl font-bold mb-4">投票已完成</h2>
              
              <p className="text-black font-bold mb-6 leading-relaxed">
                <span className="block sm:inline">感謝您參與投票,</span>
                <span className="block sm:inline sm:ml-1">結果將於投票結束後公佈.</span>
              </p>
              <div className="bg-slate-50 p-5 rounded-lg mb-8 text-left border border-slate-100 font-bold">
                <div className="flex justify-between items-center mb-3">
                  <span className="text-black">現時參與投票人數：</span>
                  <span className="text-xl text-blue-600">{participatedCount} 人</span>
                </div>
                <div className="flex justify-between items-center">
                  <span className="text-black">現時投票參與率：</span>
                  <span className="text-xl text-blue-600">{participationRate}%</span>
                </div>
              </div>
              <Button variant="outline" onClick={handleLogout} className="w-full font-bold">
                <Icon name="LogOut" className="w-4 h-4 mr-2" /> 返回首頁
              </Button>
            </Card>
          </div>
        );
      }

      // 取得可顯示的投票項目 (過濾掉設定為隱藏的主題)
      const displayPolls = polls.filter(p => p.status === 'active' && p.isVisible !== false);

      return (
        <div className="max-w-3xl mx-auto space-y-6 pb-20">
          <Card className="p-3 sm:p-4 flex flex-col sm:flex-row justify-between items-stretch sm:items-center sticky top-[60px] sm:top-[80px] z-40 bg-white/90 backdrop-blur-md shadow-sm gap-3 sm:gap-0">
            <div className="flex items-center gap-3 w-full sm:w-auto">
              <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-mono font-bold text-slate-700 text-sm shrink-0">
                {currentVoterCode}
              </div>
              <div className="flex flex-col">
                <div className="flex items-center gap-2">
                  <span className="text-sm font-medium text-slate-500">當前通行碼</span>
                  <span className="text-xs text-green-600 font-bold flex items-center gap-1"><Icon name="CheckCircle2" className="w-3 h-3"/> 已驗證</span>
                </div>
              </div>
            </div>

            {timeLeft && (
              <div className="border-t sm:border-0 border-slate-100 pt-3 sm:pt-0 flex flex-col sm:items-end w-full sm:w-auto">
                <span className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1 sm:mb-0">剩餘時間</span>
                <div className={`text-xs sm:text-sm md:text-base font-bold flex items-center sm:gap-1.5 ${timeStatus === 'ended' ? 'text-red-600' : 'text-blue-600'}`}>
                  <Icon name="Clock" className="w-4 h-4 hidden sm:block shrink-0" />
                  <span className="font-mono">{timeLeft}</span>
                </div>
              </div>
            )}
          </Card>

          <div className="space-y-8 mt-8">
            {displayPolls.length === 0 ? (
               <div className="text-center p-8 text-slate-500">目前沒有開放的投票主題。</div>
            ) : (
              displayPolls.map((poll, index) => {
                const selectedCount = selections[poll.id]?.length || 0;
                return (
                  <Card key={poll.id} className="overflow-hidden border-2 border-slate-100 hover:border-blue-100 transition-colors">
                    <div className="bg-slate-50 px-4 sm:px-6 py-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-0">
                      <h3 className="text-lg sm:text-xl font-bold text-slate-800 flex items-start sm:items-center gap-2 leading-snug">
                        <span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm shrink-0">{index + 1}</span>
                        <span>{poll.title}</span>
                      </h3>
                      <span className={`text-sm font-medium px-3 py-1 rounded-full inline-block ${selectedCount === poll.maxSelect ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                        可選 {poll.maxSelect} 項 (已選 {selectedCount})
                      </span>
                    </div>
                    <div className="p-4 sm:p-6 space-y-3">
                      {poll.options.map(opt => {
                        const isSelected = selections[poll.id]?.includes(opt.id);
                        const isDisabled = poll.maxSelect > 1 && !isSelected && selectedCount >= poll.maxSelect;
                        
                        return (
                          <label 
                            key={opt.id} 
                            className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-all ${
                              isSelected 
                                ? 'border-blue-500 bg-blue-50/50' 
                                : isDisabled 
                                  ? 'border-slate-100 bg-slate-50 opacity-50 cursor-not-allowed' 
                                  : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'
                            }`}
                          >
                            <div className="relative flex items-center justify-center">
                              <input
                                type={poll.maxSelect === 1 ? 'radio' : 'checkbox'}
                                name={`poll-${poll.id}`}
                                checked={isSelected}
                                disabled={isDisabled}
                                onChange={() => {
                                  if (!isDisabled) {
                                    handleOptionToggle(poll.id, opt.id, poll.maxSelect);
                                  }
                                }}
                                className="w-5 h-5 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer"
                              />
                            </div>
                            <span className={`ml-4 text-lg ${isSelected ? 'font-medium text-blue-900' : 'text-slate-700'}`}>
                              {opt.text}
                            </span>
                          </label>
                        );
                      })}
                    </div>
                  </Card>
                );
              })
            )}
          </div>

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] z-50">
            <div className="max-w-3xl mx-auto flex justify-between items-center">
              <Button variant="outline" onClick={handleLogout} className="text-slate-500 border-slate-200">
                取消並登出
              </Button>
              <Button onClick={() => setShowConfirmModal(true)} className="px-8 py-3 text-lg shadow-lg hover:-translate-y-0.5 transition-transform" disabled={timeStatus === 'ended' || displayPolls.length === 0}>
                確認送出選票 <Icon name="CheckCircle2" className="w-5 h-5 ml-2" />
              </Button>
            </div>
          </div>

          {showConfirmModal && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm print:hidden">
              <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm m-4 animate-in fade-in zoom-in-95">
                <h3 className="text-xl font-bold mb-2">提示訊息</h3>
                <p className="text-slate-600 mb-6 text-sm">請確認選票,經確認後選項將不能更改,敬請留意!</p>
                <div className="flex gap-3 justify-end mt-6">
                  <Button variant="secondary" onClick={() => setShowConfirmModal(false)}>取消</Button>
                  <Button variant="primary" onClick={() => {
                    setShowConfirmModal(false);
                    handleSubmitVote();
                  }}>確認</Button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
